{{- if and .Values.sidecarIngress.enabled .Values.sidecarIngress.host -}}
{{- $fullName := include "codehub.fullname" . -}}
{{- if .Values.sshBridge.enabled }}
{{- $sshPublicPath := .Values.sshBridge.ingressPath | default "/ssh-tunnel" -}}
{{- $sshPrefix := .Values.sshBridge.pathPrefix | default "ssh-tunnel" -}}
{{- $sshStripPrefix := include "codehub.sidecarStripPrefix" (dict "publicPath" $sshPublicPath "innerPrefix" $sshPrefix) -}}
{{- $sshMiddlewareName := printf "%s-ssh-strip" $fullName -}}
{{- if and $sshStripPrefix (eq (include "codehub.ingressUsesTraefik" .) "true") (eq (include "codehub.traefikMiddlewareSupported" .) "true") }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $sshMiddlewareName }}
  labels:
    {{- include "codehub.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - {{ $sshStripPrefix }}
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-ssh-tunnel
  labels:
    {{- include "codehub.labels" . | nindent 4 }}
  annotations:
    {{- include "codehub.sidecarIngressAnnotations" (dict "root" . "fullName" $fullName "innerPrefix" $sshPrefix "stripPrefix" $sshStripPrefix "middlewareName" $sshMiddlewareName) | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.sidecarIngress.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.sidecarIngress.host | quote }}
      secretName: {{ .Values.sidecarIngress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.sidecarIngress.host | quote }}
      http:
        paths:
          - {{- include "codehub.sidecarIngressPath" (dict "root" . "publicPath" $sshPublicPath "innerPrefix" $sshPrefix) | nindent 12 }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ .Values.sshBridge.wsPort }}
{{- end }}
{{- if and .Values.sshBridge.enabled .Values.portTunnel.enabled }}
---
{{- end }}
{{- if .Values.portTunnel.enabled }}
{{- $portPublicPath := .Values.portTunnel.ingressPath | default "/port-tunnel" -}}
{{- $portPrefix := .Values.portTunnel.pathPrefix | default "port-tunnel" -}}
{{- $portStripPrefix := include "codehub.sidecarStripPrefix" (dict "publicPath" $portPublicPath "innerPrefix" $portPrefix) -}}
{{- $portMiddlewareName := printf "%s-port-strip" $fullName -}}
{{- if and $portStripPrefix (eq (include "codehub.ingressUsesTraefik" .) "true") (eq (include "codehub.traefikMiddlewareSupported" .) "true") }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $portMiddlewareName }}
  labels:
    {{- include "codehub.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - {{ $portStripPrefix }}
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-port-tunnel
  labels:
    {{- include "codehub.labels" . | nindent 4 }}
  annotations:
    {{- include "codehub.sidecarIngressAnnotations" (dict "root" . "fullName" $fullName "innerPrefix" $portPrefix "stripPrefix" $portStripPrefix "middlewareName" $portMiddlewareName) | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.sidecarIngress.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.sidecarIngress.host | quote }}
      secretName: {{ .Values.sidecarIngress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.sidecarIngress.host | quote }}
      http:
        paths:
          - {{- include "codehub.sidecarIngressPath" (dict "root" . "publicPath" $portPublicPath "innerPrefix" $portPrefix) | nindent 12 }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ .Values.portTunnel.wsPort }}
{{- end }}
{{- end }}
