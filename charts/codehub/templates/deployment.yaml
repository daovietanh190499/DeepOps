apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codehub.fullname" . }}
  labels:
    {{- include "codehub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "codehub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "codehub.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{- if .Values.sshBridge.enabled }} {{ include "codehub.sshBridgeServiceAccountName" . }}{{- else }} {{ include "codehub.serviceAccountName" . }}{{- end }}
      {{- if .Values.sshBridge.enabled }}
      automountServiceAccountToken: false
      {{- end }}
      terminationGracePeriodSeconds: 30
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if and .Values.auth.resetConfigOnDeploy .Values.env.secret }}
      {{- if or .Values.env.secret.PASSWORD .Values.env.secret.HASHED_PASSWORD }}
      {{- $resetMountPath := .Values.auth.resetMountPath | default (.Values.persistence.mountPath | default "/home/coder") }}
      {{- $resetVolumeName := .Values.auth.resetVolumeName | default "workspace-volume" }}
      initContainers:
        - name: reset-auth-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              MNT="{{ $resetMountPath }}"
              CFG="$MNT/.config/code-server/config.yaml"
              if [ -f "$CFG" ]; then
                rm -f "$CFG"
                echo "reset code-server auth config"
              fi
          {{- if or .Values.persistence.enabled .Values.auth.resetVolumeName }}
          volumeMounts:
            - name: {{ $resetVolumeName }}
              mountPath: {{ $resetMountPath }}
              {{- with .Values.auth.resetSubPath }}
              subPath: {{ . }}
              {{- end }}
          {{- end }}
      {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.env.secret }}
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
          {{- end }}
          {{- with .Values.extraEnv }}
          env:
            {{- range . }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- end }}
          {{- $container := .Values.container | default dict }}
          {{- if $container.command }}
          command:
            {{- toYaml $container.command | nindent 12 }}
          {{- end }}
          {{- if $container.args }}
          args:
            {{- toYaml $container.args | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- range .Values.service.extraPorts }}
            - name: {{ .name }}
              containerPort: {{ .port }}
              protocol: TCP
            {{- end }}
          {{- $resources := deepCopy .Values.resources }}
          {{- if .Values.gpu.enabled }}
          {{- $_ := set $resources.limits "nvidia.com/gpu" (.Values.gpu.count | int) }}
          {{- $_ := set $resources.requests "nvidia.com/gpu" (.Values.gpu.count | int) }}
          {{- if gt (int .Values.gpu.memoryMiB) 0 }}
          {{- $_ := set $resources.limits "nvidia.com/gpumem" (.Values.gpu.memoryMiB | int) }}
          {{- $_ := set $resources.requests "nvidia.com/gpumem" (.Values.gpu.memoryMiB | int) }}
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml $resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: workspace-volume
              mountPath: {{ .Values.persistence.mountPath | default "/home/coder" }}
              {{- with .Values.persistence.subPath }}
              subPath: {{ . }}
              {{- end }}
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if .Values.sshBridge.enabled }}
        - name: ssh-bridge
          image: "{{ .Values.sshBridge.image.repository }}:{{ .Values.sshBridge.image.tag }}"
          imagePullPolicy: {{ .Values.sshBridge.image.pullPolicy }}
          ports:
            - name: ssh-ws
              containerPort: {{ .Values.sshBridge.wsPort }}
              protocol: TCP
          env:
            - name: SSH_USER
              value: {{ .Values.sshBridge.sshUser | quote }}
            - name: SSH_PORT
              value: {{ .Values.sshBridge.sshPort | quote }}
            - name: WS_PORT
              value: {{ .Values.sshBridge.wsPort | quote }}
            - name: WS_PATH_PREFIX
              value: {{ trimPrefix "/" (.Values.sshBridge.ingressPath | default "/ssh-tunnel") | quote }}
            - name: AUTHORIZED_KEYS
              value: /ssh/authorized_keys
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TARGET_CONTAINER
              value: {{ .Values.sshBridge.targetContainer | default .Chart.Name | quote }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: ssh-authorized-keys
              mountPath: /ssh/authorized_keys
              subPath: authorized_keys
              readOnly: true
            - name: ssh-authorized-keys
              mountPath: /ssh-data/host_key
              subPath: host_key
              readOnly: true
            - name: k8s-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
        {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        {{- $claimName := .Values.persistence.claimName | default .Values.mainVolume.claimName }}
        {{- if $claimName }}
        - name: workspace-volume
          persistentVolumeClaim:
            claimName: {{ $claimName }}
        {{- end }}
        {{- end }}
        {{- if .Values.sshBridge.enabled }}
        - name: ssh-authorized-keys
          secret:
            secretName: {{ required "sshBridge.secretName required when sshBridge.enabled" .Values.sshBridge.secretName }}
            optional: false
        - name: k8s-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
