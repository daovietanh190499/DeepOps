<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ code }} — Dohub</title>
    <link rel="icon" href="/static/img/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-50 p-6">
    <div class="max-w-md w-full rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-lg">
        <img src="/static/img/logo.png" alt="Dohub" class="mx-auto mb-6 h-14 w-14 object-contain">
        <p class="text-sm font-bold text-slate-800 mb-2">Dohub</p>
        <p class="text-6xl font-bold text-slate-300">{{ code }}</p>
        <p class="mt-4 text-slate-600">{{ error }}</p>
        <a href="/" class="mt-8 inline-block rounded-xl bg-blue-600 px-6 py-3 font-semibold text-white hover:bg-blue-700">
            Back to home
        </a>
    </div>
</body>
</html>
