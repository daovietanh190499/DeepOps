{{- $sidecarRbac := or (and .Values.sshBridge.enabled .Values.sshBridge.rbac.create) (and .Values.monitor.enabled .Values.monitor.rbac.create) }}
{{- if $sidecarRbac }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "codehub.sidecarServiceAccountName" . }}
  labels:
    {{- include "codehub.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "codehub.fullname" . }}-sidecar
  labels:
    {{- include "codehub.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "codehub.fullname" . }}-sidecar
  labels:
    {{- include "codehub.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "codehub.fullname" . }}-sidecar
subjects:
  - kind: ServiceAccount
    name: {{ include "codehub.sidecarServiceAccountName" . }}
{{- end }}
